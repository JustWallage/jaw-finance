name: Branch Pipeline

on:
  push:
    branches-ignore: [main]

concurrency:
  group: branch-pipeline-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - name: Check commit message for trigger
        id: check
        run: |
          if echo "${{ github.event.head_commit.message }}" | head -1 | grep -qi "run-pipeline"; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          fi

  check-and-build:
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    uses: ./.github/workflows/check-and-build.yml
    permissions:
      contents: read
    secrets: inherit

  ephemeral-e2e:
    needs: check-and-build
    uses: ./.github/workflows/ephemeral-e2e.yml
    permissions:
      contents: read
      deployments: write
    secrets: inherit
