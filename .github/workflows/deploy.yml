name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.12"

      - name: Terraform Init
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: |
          terraform init \
            -backend-config="endpoints={s3=\"https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com\"}"

      - name: Check
        run: pnpm check

      - name: Build
        run: pnpm build

      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: dist
          retention-days: 1

  terraform:
    needs: check-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      staging_db_id: ${{ steps.outputs.outputs.staging_db_id }}
      prod_db_id: ${{ steps.outputs.outputs.prod_db_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.12"

      - name: Terraform Init
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: |
          terraform init \
            -backend-config="endpoints={s3=\"https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com\"}"

      - name: Terraform Apply
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: terraform apply -auto-approve

      - name: Read Terraform Outputs
        id: outputs
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: |
          echo "staging_db_id=$(terraform output -raw d1_database_id_staging)" >> "$GITHUB_OUTPUT"
          echo "prod_db_id=$(terraform output -raw d1_database_id_prod)" >> "$GITHUB_OUTPUT"

  set-secrets:
    needs: check-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Set Pages Secrets
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ENABLE_BANKING_APP_ID: ${{ secrets.ENABLE_BANKING_APP_ID }}
          ENABLE_BANKING_SECRET: ${{ secrets.ENABLE_BANKING_SECRET }}
        run: |
          secrets=(ENABLE_BANKING_APP_ID ENABLE_BANKING_SECRET)
          for name in "${secrets[@]}"; do
            for env in preview production; do
              printf '%s' "${!name}" | pnpm exec wrangler pages secret put "$name" --project-name jaw-finance --env "$env"
            done
          done

  deploy-test:
    needs: [terraform, set-secrets]
    uses: ./.github/workflows/staging-e2e.yml
    with:
      staging_db_id: ${{ needs.terraform.outputs.staging_db_id }}
      prod_db_id: ${{ needs.terraform.outputs.prod_db_id }}
    secrets: inherit

  deploy-prod:
    needs: [deploy-test, terraform]
    uses: ./.github/workflows/deploy-env.yml
    with:
      branch: main
      environment: production
      staging_db_id: ${{ needs.terraform.outputs.staging_db_id }}
      prod_db_id: ${{ needs.terraform.outputs.prod_db_id }}
    secrets: inherit
