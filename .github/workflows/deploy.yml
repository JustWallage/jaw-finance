name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

jobs:
    deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: read
            deployments: write

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup pnpm
              uses: pnpm/action-setup@v4

            - name: Setup Node
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: pnpm

            - name: Install dependencies
              run: pnpm install --frozen-lockfile

            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3
              with:
                  terraform_version: "~1.12"

            - name: Terraform Init
              working-directory: iac
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
              run: |
                  terraform init \
                    -backend-config="endpoints={s3=\"https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com\"}"

            - name: Check
              run: pnpm check

            - name: Terraform Apply
              working-directory: iac
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
                  TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
                  TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
              run: terraform apply -auto-approve

            - name: Read Terraform Outputs
              working-directory: iac
              env:
                  AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
                  AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
              run: |
                  echo "STAGING_DB_ID=$(terraform output -raw d1_database_id_staging)" >> "$GITHUB_ENV"
                  echo "PROD_DB_ID=$(terraform output -raw d1_database_id_prod)" >> "$GITHUB_ENV"

            - name: Generate wrangler.toml
              run: |
                  sed \
                    -e "s/STAGING_DB_ID/$STAGING_DB_ID/g" \
                    -e "s/PROD_DB_ID/$PROD_DB_ID/g" \
                    wrangler.toml.template > wrangler.toml

            - name: Build
              run: pnpm build

            - name: Run Staging DB Migrations
              run: npx wrangler d1 migrations apply DB --env staging

            - name: Deploy to Staging
              run: npx wrangler pages deploy dist --project-name jaw-finance --branch staging

            - name: Install Playwright browsers
              run: pnpm exec playwright install --with-deps chromium

            - name: Run E2E tests against Staging
              run: pnpm exec playwright test

            - name: Run Production DB Migrations
              run: npx wrangler d1 migrations apply DB --env production

            - name: Deploy to Production
              run: npx wrangler pages deploy dist --project-name jaw-finance --branch main
