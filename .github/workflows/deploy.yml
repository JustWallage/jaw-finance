name: Deploy

on:
  push:
    branches: [main]

jobs:
  check-and-build:
    uses: ./.github/workflows/check-and-build.yml
    permissions:
      contents: read
    secrets: inherit

  terraform:
    needs: check-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.12"

      - name: Terraform Init
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
        run: |
          terraform init \
            -backend-config="endpoints={s3=\"https://${{ secrets.CLOUDFLARE_ACCOUNT_ID }}.r2.cloudflarestorage.com\"}"

      - name: Terraform Apply
        working-directory: iac
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.CLOUDFLARE_R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.CLOUDFLARE_R2_SECRET_ACCESS_KEY }}
          TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          TF_VAR_google_client_id: ${{ secrets.GOOGLE_CLIENT_ID }}
          TF_VAR_google_client_secret: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: terraform apply -auto-approve

  check-skip-e2e:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - name: Check commit message for -skip-e2e
        id: check
        run: |
          if echo "${{ github.event.head_commit.message }}" | head -1 | grep -qi "\-skip-e2e"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  ephemeral-e2e:
    needs: [check-and-build, check-skip-e2e]
    if: needs.check-skip-e2e.outputs.skip != 'true'
    uses: ./.github/workflows/ephemeral-e2e.yml
    permissions:
      contents: read
      deployments: write
    secrets: inherit

  deploy-prod:
    needs: [check-and-build, terraform, ephemeral-e2e, check-skip-e2e]
    if: |
      always() &&
      needs.check-and-build.result == 'success' &&
      needs.terraform.result == 'success' &&
      (needs.ephemeral-e2e.result == 'success' || needs.ephemeral-e2e.result == 'skipped')
    uses: ./.github/workflows/deploy-prod.yml
    permissions:
      contents: read
      deployments: write
    secrets: inherit
