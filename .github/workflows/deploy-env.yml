name: Deploy Environment

on:
  workflow_call:
    inputs:
      branch:
        description: "Pages branch to deploy to (e.g. staging or main)"
        type: string
        required: true
      environment:
        description: "Wrangler environment (preview or production)"
        type: string
        required: true
      staging_db_id:
        type: string
        required: true
      prod_db_id:
        type: string
        required: true
    secrets:
      CLOUDFLARE_ACCOUNT_ID:
        required: true
      CLOUDFLARE_API_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@v4
        with:
          name: build
          path: dist

      - name: Generate wrangler.toml
        run: |
          sed \
            -e "s/STAGING_DB_ID/${{ inputs.staging_db_id }}/g" \
            -e "s/PROD_DB_ID/${{ inputs.prod_db_id }}/g" \
            wrangler.toml.template > wrangler.toml

      - name: Run DB Migrations
        run: pnpm exec wrangler d1 migrations apply DB --remote --env ${{ inputs.environment }}

      - name: Deploy
        run: pnpm exec wrangler pages deploy dist --project-name jaw-finance --branch ${{ inputs.branch }} --commit-dirty=true
